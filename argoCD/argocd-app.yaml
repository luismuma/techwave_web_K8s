apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app-green
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/luismuma/techwave_web_K8s.git
    targetRevision: main
    path: helm/flask-app
    helm:
      valueFiles:
        - values-green.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
