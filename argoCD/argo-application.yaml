apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techwave-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/luismuma/techwave_web_K8s.git
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
