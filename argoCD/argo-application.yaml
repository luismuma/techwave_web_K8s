apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techwave-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/luismuma/techwave_web_K8s.git
    targetRevision: main   # mejor usar rama fija que HEAD
    path: helm/flask-app
    helm:
      valueFiles:
        - values-green.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-app
  syncPolicy:
    automated:
      prune: true      # elimina recursos que no estén en Git
      selfHeal: true   # corrige cambios manuales en K8s
