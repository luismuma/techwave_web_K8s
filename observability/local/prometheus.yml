global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "flask-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["172.21.0.2:30007"]
        labels:
          app: flask-app

  - job_name: "loki"
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          app: loki

