name: Create Cluster and Trigger Build

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  cluster:
    runs-on: ubuntu-latest

    steps:
      # 🔍 INFO GENERAL
      - name: Debug info
        run: |
          echo "=================================="
          echo "🚀 INICIO WORKFLOW CLUSTER"
          echo "=================================="
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit message: ${{ github.event.head_commit.message }}"
          echo "Actor: ${{ github.actor }}"
          echo "SHA: ${{ github.sha }}"
          echo "=================================="

      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 🔍 Ver estructura repo
      - name: List repo files
        run: |
          echo "📂 Contenido del repo:"
          ls -la
          echo "📂 Contenido argoCD:"
          ls -la ./techwave_web_k8s/argoCD || true

      # 2️⃣ Detectar si commit es vacío
      - name: Check if commit is empty
        id: check_empty
        run: |
          # Traemos commits previos para diff
          git fetch origin main
          DIFF=$(git diff --name-only HEAD^ HEAD)
          if [ -z "$DIFF" ]; then
            echo "empty=true" >> $GITHUB_ENV
            echo "📌 Commit vacío detectado. Se saltará la creación del cluster."
          else
            echo "empty=false" >> $GITHUB_ENV
            echo "📌 Commit con cambios detectado. Se ejecutará la creación del cluster."
          fi

      # 3️⃣ Crear cluster con Kind + ArgoCD solo si commit NO es vacío
      - name: Crear cluster
        if: env.empty == 'false'
        run: |
          echo "🚀 Ejecutando script de instalación..."
          chmod +x ./techwave_web_k8s/argoCD/install-argocd-kind_v2.sh
          ./techwave_web_k8s/argoCD/install-argocd-kind_v2.sh

      # 🔍 Debug Kubernetes
      - name: Debug Kubernetes
        if: env.empty == 'false'
        run: |
          echo "=================================="
          echo "📡 ESTADO DEL CLUSTER"
          echo "=================================="

          echo "📡 Clusters disponibles:"
          kind get clusters || true

          echo "📡 Contexto actual:"
          kubectl config current-context || true

          echo "📡 Pods en todos los namespaces:"
          kubectl get pods -A || true

      # 4️⃣ Trigger del workflow de build
      - name: Trigger Build workflow (hack push)
        run: |
          echo "=================================="
          echo "🚀 LANZANDO WORKFLOW BUILD"
          echo "=================================="

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git commit --allow-empty -m "trigger build"
          git push origin main

          echo "✅ Push realizado correctamente"
          echo "👉 Debería ejecutarse el workflow de build ahora"
