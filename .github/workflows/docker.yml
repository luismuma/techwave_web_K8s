name: Build and Deploy Docker Image
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2️⃣ Login Docker Hub
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build image con SHA corto
      - name: Build Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build -t lumuma2025/techwave_web_k8s:$IMAGE_TAG -f docker/Dockerfile .
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 4️⃣ Push image
      - name: Push Docker image
        run: |
          docker push lumuma2025/techwave_web_k8s:$IMAGE_TAG
          
      # 5️⃣ Instalar yq
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # 6️⃣ Actualizar Helm values.yaml
      - name: Update Helm values.yaml
        run: |
          yq -i '.image.tag = strenv(IMAGE_TAG)' helm/flask-app/values-green.yaml

      # 7️⃣ Debug values file
      - name: Debug values file
        run: |
          cat helm/flask-app/values-green.yaml
          
      # 8️⃣ Commit & push (dispara ArgoCD)
      - name: Commit and push updated values.yaml
        run: |
          # Configurar usuario git
          git config user.name "lumuma_2025"
          git config user.email "lumuma_2025@users.noreply.github.com"
      
          # Configurar remote con token para autenticación
          git remote set-url origin https://lumuma_2025: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@github.com/luismuma/techwave_web_K8s.git
      
          # Añadir y commitear cambios
          git add helm/flask-app/values-green.yaml
          git commit -m "chore: update Docker image to $IMAGE_TAG" || echo "No changes"
      
          # Push al repo
          git push origin HEAD:main || echo "No changes"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
     
        
